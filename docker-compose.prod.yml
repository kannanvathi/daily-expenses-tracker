version: "3.8"

services:
  backend:
    image: ghcr.io/${GITHUB_USER:-kannanvathi}/daily-expenses-tracker-backend:latest
    environment:
      - PORT=8000
      - MONGO_URI=${MONGO_URI}
    ports:
      - "8000:8000"
    depends_on:
      - mongo

  frontend:
    image: ghcr.io/${GITHUB_USER:-kannanvathi}/daily-expenses-tracker-frontend:latest
    ports:
      - "80:80"
    depends_on:
      - backend

  mongo:
    image: mongo:6
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"

volumes:
  mongo-data:
